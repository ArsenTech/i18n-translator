name: "Build App Release"

on:
  push:
    tags:
      - 'v*'
  pull_request:
    types:
      - opened
    branches:
      - main
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'ubuntu-24.04-arm'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu only)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and Publish Release
        uses: tauri-apps/tauri-action@v0
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'I18N Translator v__VERSION__'
          releaseDraft: true
          prerelease: false
          generateReleaseNotes: true
          args: ${{ matrix.args }}
          releaseBody: |
            ## What's Changed?

            [Add a changelog]

            **Full Changelog:** [`i18n-translator/CHANGELOG.md`](https://github.com/ArsenTech/i18n-translator/blob/main/CHANGELOG.md)

            ---

            ## Downloads
            ### :penguin: Linux
            - **rpm** - [I18N.Translator-__VERSION__-1.x86_64.rpm][linux-amd-rpm]
            - **AppImage** - [I18N.Translator___VERSION___amd64.AppImage][linux-amd-appimage]
            - **deb** - [I18N.Translator___VERSION___amd64.deb][linux-amd-deb]

            ### :penguin: Linux (ARM64)
            - **rpm** - [I18N.Translator-__VERSION__-1.aarch64.rpm][linux-arm-rpm]
            - **AppImage** - [CI18N.Translator___VERSION___aarch64.AppImage][linux-arm-appimage]
            - **deb** - [I18N.Translator___VERSION___arm64.deb][linux-arm-deb]

            ### :window: Windows
            - **exe** - [I18N.Translator___VERSION___x64-setup.exe][windows-exe]
            - **msi** - [I18N.Translator___VERSION___x64_en-US.msi][windows-msi]

            ### :apple: macOS
            - **dmg** - [I18N.Translator___VERSION___x64.dmg][mac-x64-dmg]
            - **app.tar.gz** - [I18N.Translator_x64.app.tar.gz][mac-x64-tar]

            ### :green_apple: macOS (ARM64)
            - **dmg** - [I18N.Translator___VERSION___aarch64.dmg][mac-arm64-dmg]
            - **app.tar.gz** - [I18N.Translator_aarch64.app.tar.gz][mac-arm64-tar]

            [mac-arm64-dmg]: https://github.com/ArsenTech/i18n-translator/releases/download/v__VERSION__/I18N.Translator___VERSION___aarch64.dmg
            [mac-x64-dmg]: https://github.com/ArsenTech/i18n-translator/releases/download/v__VERSION__/I18N.Translator___VERSION___x64.dmg
            [mac-arm64-tar]: https://github.com/ArsenTech/i18n-translator/releases/download/v__VERSION__/I18N.Translator_aarch64.app.tar.gz
            [mac-x64-tar]: https://github.com/ArsenTech/i18n-translator/releases/download/v__VERSION__/I18N.Translator_x64.app.tar.gz

            [windows-exe]: https://github.com/ArsenTech/i18n-translator/releases/download/v__VERSION__/I18N.Translator___VERSION___x64-setup.exe
            [windows-msi]: https://github.com/ArsenTech/i18n-translator/releases/download/v__VERSION__/I18N.Translator___VERSION___x64_en-US.msi

            [linux-amd-rpm]: https://github.com/ArsenTech/i18n-translator/releases/download/v__VERSION__/I18N.Translator-__VERSION__-1.x86_64.rpm
            [linux-amd-appimage]: https://github.com/ArsenTech/i18n-translator/releases/download/v__VERSION__/I18N.Translator___VERSION___amd64.AppImage
            [linux-amd-deb]: https://github.com/ArsenTech/i18n-translator/releases/download/v__VERSION__/I18N.Translator___VERSION___amd64.deb

            [linux-arm-rpm]: https://github.com/ArsenTech/i18n-translator/releases/download/v__VERSION__/I18N.Translator-__VERSION__-1.aarch64.rpm
            [linux-arm-appimage]: https://github.com/ArsenTech/i18n-translator/releases/download/v__VERSION__/I18N.Translator___VERSION___aarch64.AppImage
            [linux-arm-deb]: https://github.com/ArsenTech/i18n-translator/releases/download/v__VERSION__/I18N.Translator___VERSION___arm64.deb

      - name: Test Build (PR / workflow_dispatch)
        uses: tauri-apps/tauri-action@v0
        if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
        with:
          args: ${{ matrix.args }} --no-bundle